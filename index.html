<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Phone Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #ff6b6b;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none !important;
        }

        /* Lobby */
        #lobby {
            text-align: center;
        }

        .room-code {
            font-size: 3em;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 20px 0;
            color: #ffd93d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .players-list {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .player {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        .player.host::after {
            content: " 👑";
        }

        /* Game Canvas */
        #game {
            text-align: center;
        }

        .word-display {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #ffd93d;
        }

        .timer {
            font-size: 2em;
            margin-bottom: 10px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }

        .tools {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .color-btn.active {
            border-color: #ffd93d;
            transform: scale(1.2);
        }

        .size-slider {
            width: 200px;
            margin: 0 10px;
        }

        /* Results */
        .results-chain {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .chain-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .chain-item img {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }

        #error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Gartic Phone</h1>
        
        <!-- Main Menu -->
        <div id="main-menu" class="menu">
            <input type="text" id="player-name" placeholder="Ditt namn" maxlength="20">
            <button onclick="showCreateRoom()">Skapa Rum</button>
            <button onclick="showJoinRoom()">Gå med i Rum</button>
        </div>

        <!-- Join Room -->
        <div id="join-menu" class="menu hidden">
            <input type="text" id="room-code-input" placeholder="Rumskod (t.ex. ABCD)" maxlength="4">
            <button onclick="joinRoom()">Gå med</button>
            <button onclick="showMainMenu()">Tillbaka</button>
        </div>

        <!-- Lobby -->
        <div id="lobby" class="hidden">
            <p>Rumskod:</p>
            <div class="room-code" id="room-code-display">----</div>
            <div class="players-list" id="players-list"></div>
            <button id="start-btn" class="hidden" onclick="startGame()">Starta Spelet!</button>
            <p id="waiting-text">Väntar på host...</p>
        </div>

        <!-- Game -->
        <div id="game" class="hidden">
            <div class="word-display" id="current-word"></div>
            <div class="timer" id="timer">60</div>
            
            <canvas id="drawing-canvas" width="500" height="400"></canvas>
            
            <div class="tools">
                <div class="color-btn active" style="background: #000" onclick="setColor('#000')"></div>
                <div class="color-btn" style="background: #ff0000" onclick="setColor('#ff0000')"></div>
                <div class="color-btn" style="background: #00ff00" onclick="setColor('#00ff00')"></div>
                <div class="color-btn" style="background: #0000ff" onclick="setColor('#0000ff')"></div>
                <div class="color-btn" style="background: #ffff00" onclick="setColor('#ffff00')"></div>
                <div class="color-btn" style="background: #ff00ff" onclick="setColor('#ff00ff')"></div>
                <div class="color-btn" style="background: #00ffff" onclick="setColor('#00ffff')"></div>
                <div class="color-btn" style="background: #ffffff" onclick="setColor('#ffffff')"></div>
            </div>
            
            <div>
                <label>Storlek: </label>
                <input type="range" class="size-slider" id="brush-size" min="2" max="20" value="5">
                <button onclick="clearCanvas()">Rensa</button>
                <button onclick="submitDrawing()" id="submit-btn">Klar!</button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <h2>Resultat</h2>
            <div id="results-content"></div>
            <button onclick="location.reload()">Nytt Spel</button>
        </div>

        <div id="error-message"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Konfiguration - ÄNDRA DETTA till din server
        const SERVER_URL = 'https://din-server-url.herokuapp.com'; // eller din Render/Railway URL
        
        let socket;
        let currentRoom = null;
        let isHost = false;
        let currentColor = '#000';
        let isDrawing = false;
        let canvas, ctx;

        // Initiera canvas
        function initCanvas() {
            canvas = document.getElementById('drawing-canvas');
            ctx = canvas.getContext('2d');
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Mouse events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch events
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            if (e.type === 'touchstart') {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(x, y);
            } else if (e.type === 'touchmove' && isDrawing) {
                ctx.lineWidth = document.getElementById('brush-size').value;
                ctx.strokeStyle = currentColor;
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('brush-size').value;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function setColor(color) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.style.background === color || 
                    (color === '#000' && btn.style.background === 'rgb(0, 0, 0)')) {
                    btn.classList.add('active');
                }
            });
        }

        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function connectSocket() {
            socket = io(SERVER_URL);
            
            socket.on('connect', () => {
                console.log('Ansluten till servern');
            });
            
            socket.on('room-created', ({ roomCode, playerId }) => {
                currentRoom = roomCode;
                isHost = true;
                showLobby(roomCode);
            });
            
            socket.on('joined-room', ({ roomCode, playerId }) => {
                currentRoom = roomCode;
                showLobby(roomCode);
            });
            
            socket.on('players-updated', (players) => {
                updatePlayersList(players);
            });
            
            socket.on('game-started', ({ round, word }) => {
                showGame(word);
            });
            
            socket.on('timer-update', (timeLeft) => {
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 10) {
                    document.getElementById('timer').style.color = '#ff6b6b';
                }
            });
            
            socket.on('round-ended', ({ nextRound }) => {
                // Visa "väntar på andra" eller gissningsvy
            });
            
            socket.on('game-ended', (players) => {
                showResults(players);
            });
            
            socket.on('error', (message) => {
                showError(message);
            });
        }

        function showMainMenu() {
            hideAll();
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function showCreateRoom() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) {
                showError('Ange ditt namn först!');
                return;
            }
            if (!socket) connectSocket();
            socket.emit('create-room', name);
        }

        function showJoinRoom() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) {
                showError('Ange ditt namn först!');
                return;
            }
            hideAll();
            document.getElementById('join-menu').classList.remove('hidden');
        }

        function joinRoom() {
            const name = document.getElementById('player-name').value.trim();
            const code = document.getElementById('room-code-input').value.trim().toUpperCase();
            
            if (!code || code.length !== 4) {
                showError('Ange en giltig 4-bokstavskod!');
                return;
            }
            
            if (!socket) connectSocket();
            socket.emit('join-room', { roomCode: code, playerName: name });
        }

        function showLobby(roomCode) {
            hideAll();
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('room-code-display').textContent = roomCode;
            
            if (isHost) {
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('waiting-text').classList.add('hidden');
            }
        }

        function updatePlayersList(players) {
            const list = document.getElementById('players-list');
            list.innerHTML = '<h3>Spelare:</h3>' + 
                players.map(p => `<div class="player ${p.isHost ? 'host' : ''}">${p.name}</div>`).join('');
        }

        function startGame() {
            socket.emit('start-game', currentRoom);
        }

        function showGame(word) {
            hideAll();
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('current-word').textContent = `Rita: ${word}`;
            initCanvas();
            clearCanvas();
        }

        function submitDrawing() {
            const drawingData = canvas.toDataURL();
            socket.emit('submit-drawing', { 
                roomCode: currentRoom, 
                drawingData: drawingData 
            });
            document.getElementById('submit-btn').textContent = 'Väntar på andra...';
            document.getElementById('submit-btn').disabled = true;
        }

        function showResults(players) {
            hideAll();
            document.getElementById('results').classList.remove('hidden');
            
            const content = document.getElementById('results-content');
            content.innerHTML = players.map(player => `
                <div class="chain-item">
                    <h4>${player.name}s kedja:</h4>
                    ${player.drawings.map((d, i) => `
                        <div>
                            <p>Runda ${i + 1}: ${d.word}</p>
                            <img src="${d.data}" alt="Ritning">
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function hideAll() {
            ['main-menu', 'join-menu', 'lobby', 'game', 'results'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            setTimeout(() => errorDiv.textContent = '', 3000);
        }

        // Initiera
        showMainMenu();
    </script>
</body>
</html>
