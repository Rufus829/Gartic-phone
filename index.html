<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Phone</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, button, textarea {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: var(--text);
            font-size: 16px;
            margin: 10px 0;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px var(--primary);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        button.secondary:hover {
            background: var(--primary);
            color: white;
        }

        .card {
            background: #0f172a;
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid #334155;
        }

        .room-code-display {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            margin: 20px 0;
        }

        .code-text {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 20px;
            font-family: monospace;
            cursor: pointer;
            user-select: all;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .player-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 2px solid #334155;
            transition: all 0.2s;
        }

        .player-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .player-card.host {
            border-color: var(--secondary);
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), transparent);
        }

        .player-card.you {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 10px;
        }

        .status {
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin: 15px 0;
        }

        .status.info {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .status.success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        canvas {
            background: white;
            border-radius: 12px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            touch-action: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .color-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 0 3px var(--primary);
            transform: scale(1.15);
        }

        .tool-group {
            display: flex;
            gap: 8px;
            background: #0f172a;
            padding: 8px;
            border-radius: 12px;
        }

        .tool-btn {
            width: auto;
            padding: 12px 20px;
            margin: 0;
            background: transparent;
            border: 1px solid #334155;
        }

        .tool-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .word-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .word-display h2 {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .word-display .word {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer {
            text-align: center;
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            font-family: monospace;
        }

        .timer.warning {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .art-card {
            background: #0f172a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .art-card img {
            width: 100%;
            display: block;
        }

        .art-card .info {
            padding: 20px;
        }

        .art-card .artist {
            font-weight: 600;
            color: var(--text);
        }

        .art-card .word {
            color: var(--primary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .hidden {
            display: none !important;
        }

        .qr-container {
            text-align: center;
            margin: 20px 0;
        }

        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }

        textarea {
            font-family: monospace;
            font-size: 12px;
            min-height: 100px;
            resize: vertical;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .step.active {
            background: var(--primary);
        }

        .step.completed {
            background: var(--secondary);
        }

        @media (max-width: 600px) {
            .app {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .code-text {
                font-size: 2.5rem;
                letter-spacing: 10px;
            }
            
            canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>🎨 Gartic Phone</h1>

        <!-- MENU -->
        <div id="screen-menu" class="screen active">
            <div class="card">
                <input type="text" id="player-name" placeholder="Ditt namn" maxlength="20">
                <button onclick="createRoom()" id="btn-create">
                    Skapa rum
                </button>
                <button onclick="showJoin()" class="secondary">
                    Gå med i rum
                </button>
            </div>
            
            <div class="card" style="text-align: center;">
                <p style="color: var(--text-muted); line-height: 1.6;">
                    Rita och gissa med vänner i realtid!<br>
                    Ingen server behövs - allt sker direkt mellan era enheter.
                </p>
            </div>
        </div>

        <!-- JOIN -->
        <div id="screen-join" class="screen">
            <div class="card">
                <h3 style="margin-bottom: 15px;">Anslut till rum</h3>
                <p style="color: var(--text-muted); margin-bottom: 15px;">
                    Klistra in rummets kod från host:
                </p>
                <input type="text" id="join-code" placeholder="Rumskod" maxlength="20">
                <button onclick="joinRoom()" id="btn-join">
                    Anslut
                </button>
                <button onclick="showScreen('screen-menu')" class="secondary">
                    Tillbaka
                </button>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="screen-lobby" class="screen">
            <div class="room-code-display" onclick="copyRoomCode()">
                <p style="margin-bottom: 10px; font-size: 1.1rem;">Dela denna kod:</p>
                <div class="code-text" id="room-code">----</div>
                <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.8;">
                    Klicka för att kopiera
                </p>
            </div>

            <div class="qr-container">
                <div id="qrcode"></div>
            </div>

            <div class="status info" id="lobby-status">
                Väntar på spelare...
            </div>

            <div class="players-grid" id="players-list"></div>

            <button id="btn-start" onclick="startGame()" class="hidden">
                Starta spelet!
            </button>
        </div>

        <!-- GAME -->
        <div id="screen-game" class="screen">
            <div class="word-display">
                <h2>Rita detta ord:</h2>
                <div class="word" id="game-word">Laddar...</div>
            </div>

            <div class="timer" id="game-timer">60</div>

            <canvas id="game-canvas" width="800" height="500"></canvas>

            <div class="toolbar">
                <div class="color-btn active" style="background: #000000" data-color="#000000" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #ef4444" data-color="#ef4444" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #3b82f6" data-color="#3b82f6" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #22c55e" data-color="#22c55e" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #eab308" data-color="#eab308" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #a855f7" data-color="#a855f7" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #f97316" data-color="#f97316" onclick="setColor(this)"></div>
                <div class="color-btn" style="background: #ffffff" data-color="#ffffff" onclick="setColor(this)"></div>

                <div class="tool-group">
                    <button class="tool-btn active" onclick="setTool('brush', this)">✏️</button>
                    <button class="tool-btn" onclick="setTool('eraser', this)">🧽</button>
                </div>

                <input type="range" id="brush-size" min="2" max="30" value="5" style="width: 120px;">
                
                <button onclick="clearCanvas()" class="tool-btn">🗑️</button>
            </div>

            <button onclick="submitDrawing()" id="btn-submit">
                Jag är klar! ✅
            </button>
        </div>

        <!-- RESULTS -->
        <div id="screen-results" class="screen">
            <h2 style="text-align: center; margin-bottom: 30px;">🎉 Resultat</h2>
            <div class="gallery" id="results-gallery"></div>
            <button onclick="location.reload()" class="secondary" style="margin-top: 30px;">
                Spela igen
            </button>
        </div>
    </div>

    <script>
        // Game State
        const STATE = {
            peer: null,
            myId: null,
            roomCode: null,
            isHost: false,
            playerName: '',
            players: [],
            connections: new Map(),
            gameState: 'menu',
            currentWord: '',
            drawings: new Map(),
            timer: null,
            timeLeft: 60,
            canvas: null,
            ctx: null,
            isDrawing: false,
            currentTool: 'brush',
            currentColor: '#000000'
        };

        const WORDS = [
            'katt', 'hund', 'enhörning', 'robot', 'pizza', 'raket',
            'dinosaurie', 'pirat', 'ninja', 'tårta', 'groda', 'astronaut'
        ];

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Room Management
        function createRoom() {
            STATE.playerName = document.getElementById('player-name').value.trim();
            if (!STATE.playerName) {
                alert('Skriv ditt namn!');
                return;
            }

            STATE.isHost = true;

            // Initialize PeerJS
            STATE.peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });

            STATE.peer.on('open', (id) => {
                STATE.myId = id;
                STATE.roomCode = id.substring(0, 6).toUpperCase();
                
                // Add self to players
                STATE.players = [{
                    id: id,
                    name: STATE.playerName,
                    isHost: true
                }];

                showLobby();
                setupHostListeners();
            });

            STATE.peer.on('error', (err) => {
                console.error('Peer error:', err);
                alert('Kunde inte skapa rum. Försök igen.');
            });
        }

        function setupHostListeners() {
            STATE.peer.on('connection', (conn) => {
                console.log('New connection:', conn.peer);
                
                conn.on('open', () => {
                    STATE.connections.set(conn.peer, conn);
                    
                    // Handle incoming data
                    conn.on('data', (data) => handleData(data, conn));
                    
                    // Send current players to new connection
                    conn.send({
                        type: 'init',
                        players: STATE.players,
                        roomCode: STATE.roomCode
                    });
                });

                conn.on('close', () => {
                    removePlayer(conn.peer);
                });
            });
        }

        function joinRoom() {
            STATE.playerName = document.getElementById('player-name').value.trim();
            const code = document.getElementById('join-code').value.trim();
            
            if (!STATE.playerName) {
                alert('Skriv ditt namn först!');
                return;
            }
            if (!code) {
                alert('Skriv rumskoden!');
                return;
            }

            STATE.isHost = false;

            STATE.peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });

            STATE.peer.on('open', (id) => {
                STATE.myId = id;
                
                // Connect to host
                const conn = STATE.peer.connect(code, {
                    reliable: true
                });

                conn.on('open', () => {
                    STATE.connections.set(code, conn);
                    conn.on('data', (data) => handleData(data, conn));
                    
                    // Join as player
                    conn.send({
                        type: 'join',
                        playerId: id,
                        playerName: STATE.playerName
                    });
                });

                conn.on('error', (err) => {
                    console.error('Connection error:', err);
                    alert('Kunde inte ansluta till rummet. Kontrollera koden.');
                });
            });
        }

        function handleData(data, conn) {
            console.log('Received:', data);

            switch(data.type) {
                case 'init':
                    // Client received initial data
                    STATE.players = data.players;
                    STATE.roomCode = data.roomCode;
                    showLobby();
                    updateStatus('Ansluten! Väntar på att spelet ska starta...');
                    break;

                case 'join':
                    // Host received new player
                    if (STATE.isHost) {
                        const newPlayer = {
                            id: data.playerId,
                            name: data.playerName,
                            isHost: false
                        };
                        STATE.players.push(newPlayer);
                        updatePlayersList();
                        
                        // Broadcast to all connections
                        broadcast({
                            type: 'player-joined',
                            player: newPlayer
                        }, data.playerId);
                        
                        updateStatus(`${data.playerName} gick med!`);
                    }
                    break;

                case 'player-joined':
                    STATE.players.push(data.player);
                    updatePlayersList();
                    break;

                case 'game-start':
                    startGameLocal(data.word);
                    break;

                case 'drawing':
                    if (STATE.isHost) {
                        STATE.drawings.set(data.playerId, {
                            playerId: data.playerId,
                            playerName: data.playerName,
                            imageData: data.imageData
                        });
                        checkAllSubmitted();
                    }
                    break;

                case 'game-end':
                    showResults(data.drawings);
                    break;
            }
        }

        function broadcast(data, excludeId = null) {
            STATE.connections.forEach((conn, id) => {
                if (id !== excludeId && conn.open) {
                    conn.send(data);
                }
            });
        }

        function removePlayer(peerId) {
            STATE.players = STATE.players.filter(p => p.id !== peerId);
            STATE.connections.delete(peerId);
            updatePlayersList();
        }

        // UI Updates
        function showLobby() {
            showScreen('screen-lobby');
            document.getElementById('room-code').textContent = STATE.roomCode;
            
            // Generate QR
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), {
                text: STATE.roomCode,
                width: 150,
                height: 150
            });

            updatePlayersList();

            if (STATE.isHost) {
                document.getElementById('btn-start').classList.remove('hidden');
            }
        }

        function updatePlayersList() {
            const container = document.getElementById('players-list');
            container.innerHTML = STATE.players.map(p => `
                <div class="player-card ${p.isHost ? 'host' : ''} ${p.id === STATE.myId ? 'you' : ''}">
                    <div class="avatar">${p.isHost ? '👑' : '🎨'}</div>
                    <div style="font-weight: 600;">${p.name}</div>
                    ${p.id === STATE.myId ? '<div style="font-size: 0.8rem; color: var(--primary);">Du</div>' : ''}
                </div>
            `).join('');

            // Update start button
            if (STATE.isHost) {
                const btn = document.getElementById('btn-start');
                if (STATE.players.length >= 2) {
                    btn.disabled = false;
                    btn.textContent = `Starta spelet (${STATE.players.length} spelare)`;
                } else {
                    btn.disabled = true;
                    btn.textContent = 'Väntar på fler spelare...';
                }
            }
        }

        function updateStatus(msg) {
            document.getElementById('lobby-status').textContent = msg;
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(STATE.roomCode).then(() => {
                updateStatus('Kod kopierad! Dela med vänner.');
                setTimeout(() => updateStatus('Väntar på spelare...'), 2000);
            });
        }

        function showJoin() {
            STATE.playerName = document.getElementById('player-name').value.trim();
            if (!STATE.playerName) {
                alert('Skriv ditt namn först!');
                return;
            }
            showScreen('screen-join');
        }

        // Game Logic
        function startGame() {
            if (STATE.players.length < 2) {
                alert('Vänta på fler spelare!');
                return;
            }

            STATE.currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            broadcast({
                type: 'game-start',
                word: STATE.currentWord
            });

            startGameLocal(STATE.currentWord);
        }

        function startGameLocal(word) {
            STATE.gameState = 'playing';
            STATE.currentWord = word;
            
            showScreen('screen-game');
            document.getElementById('game-word').textContent = word;
            
            initCanvas();
            startTimer(60);
        }

        function startTimer(seconds) {
            STATE.timeLeft = seconds;
            updateTimer();
            
            STATE.timer = setInterval(() => {
                STATE.timeLeft--;
                updateTimer();
                
                if (STATE.timeLeft <= 0) {
                    clearInterval(STATE.timer);
                    submitDrawing();
                }
            }, 1000);
        }

        function updateTimer() {
            const el = document.getElementById('game-timer');
            el.textContent = STATE.timeLeft;
            
            if (STATE.timeLeft <= 10) {
                el.classList.add('warning');
            } else {
                el.classList.remove('warning');
            }
        }

        // Canvas
        function initCanvas() {
            STATE.canvas = document.getElementById('game-canvas');
            STATE.ctx = STATE.canvas.getContext('2d');
            STATE.ctx.fillStyle = 'white';
            STATE.ctx.fillRect(0, 0, STATE.canvas.width, STATE.canvas.height);
            STATE.ctx.lineCap = 'round';
            STATE.ctx.lineJoin = 'round';

            // Events
            STATE.canvas.addEventListener('mousedown', startDraw);
            STATE.canvas.addEventListener('mousemove', draw);
            STATE.canvas.addEventListener('mouseup', stopDraw);
            STATE.canvas.addEventListener('mouseout', stopDraw);
            
            // Touch
            STATE.canvas.addEventListener('touchstart', handleTouch, {passive: false});
            STATE.canvas.addEventListener('touchmove', handleTouch, {passive: false});
            STATE.canvas.addEventListener('touchend', stopDraw);
        }

        function getPos(e) {
            const rect = STATE.canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: (clientX - rect.left) * (STATE.canvas.width / rect.width),
                y: (clientY - rect.top) * (STATE.canvas.height / rect.height)
            };
        }

        function startDraw(e) {
            STATE.isDrawing = true;
            const pos = getPos(e);
            STATE.ctx.beginPath();
            STATE.ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!STATE.isDrawing) return;
            const pos = getPos(e);
            
            STATE.ctx.lineWidth = document.getElementById('brush-size').value;
            STATE.ctx.strokeStyle = STATE.currentTool === 'eraser' ? '#ffffff' : STATE.currentColor;
            STATE.ctx.lineTo(pos.x, pos.y);
            STATE.ctx.stroke();
        }

        function stopDraw() {
            STATE.isDrawing = false;
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const evt = {
                clientX: touch.clientX,
                clientY: touch.clientY
            };
            if (e.type === 'touchstart') startDraw(evt);
            else draw(evt);
        }

        function setColor(btn) {
            STATE.currentColor = btn.dataset.color;
            STATE.currentTool = 'brush';
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.tool-btn:first-child').classList.add('active');
        }

        function setTool(tool, btn) {
            STATE.currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function clearCanvas() {
            STATE.ctx.fillStyle = 'white';
            STATE.ctx.fillRect(0, 0, STATE.canvas.width, STATE.canvas.height);
        }

        function submitDrawing() {
            clearInterval(STATE.timer);
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-submit').textContent = 'Väntar på andra...';

            const imageData = STATE.canvas.toDataURL();

            if (STATE.isHost) {
                STATE.drawings.set(STATE.myId, {
                    playerId: STATE.myId,
                    playerName: STATE.playerName,
                    imageData: imageData
                });
                checkAllSubmitted();
            } else {
                // Send to host
                const hostConn = Array.from(STATE.connections.values())[0];
                if (hostConn) {
                    hostConn.send({
                        type: 'drawing',
                        playerId: STATE.myId,
                        playerName: STATE.playerName,
                        imageData: imageData
                    });
                }
            }
        }

        function checkAllSubmitted() {
            if (STATE.drawings.size >= STATE.players.length) {
                // All submitted
                const drawingsArray = Array.from(STATE.drawings.values());
                
                broadcast({
                    type: 'game-end',
                    drawings: drawingsArray
                });

                showResults(drawingsArray);
            }
        }

        function showResults(drawings) {
            showScreen('screen-results');
            
            const gallery = document.getElementById('results-gallery');
            gallery.innerHTML = drawings.map(d => `
                <div class="art-card">
                    <img src="${d.imageData}" alt="Ritning">
                    <div class="info">
                        <div class="artist">${d.playerName}</div>
                        <div class="word">${STATE.currentWord}</div>
                    </div>
                </div>
            `).join('');
        }

        console.log('Gartic Phone loaded');
    </script>
</body>
</html>
