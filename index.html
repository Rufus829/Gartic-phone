<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Phone - Fungerande Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Screens */
        .screen { display: none; background: white; border-radius: 20px; padding: 30px; max-width: 800px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .screen.active { display: block; }
        
        /* Typography */
        h1 { color: #667eea; text-align: center; margin-bottom: 20px; font-size: 2.5rem; }
        h2 { color: #333; margin-bottom: 15px; }
        
        /* Inputs */
        input { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; }
        input:focus { border-color: #667eea; outline: none; }
        
        /* Buttons */
        button { width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-secondary { background: #ec4899; color: white; }
        .btn-secondary:hover { background: #db2777; }
        .btn-success { background: #10b981; color: white; }
        
        /* Room Code */
        .room-code-box { background: #1e1b4b; color: white; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .room-code { font-size: 2.5rem; font-weight: bold; letter-spacing: 5px; margin: 10px 0; }
        
        /* Players */
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
        .player-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .player-avatar { font-size: 2rem; margin-bottom: 5px; }
        
        /* Canvas */
        .canvas-container { background: #f5f5f5; border-radius: 10px; margin: 15px 0; position: relative; }
        canvas { display: block; border-radius: 10px; cursor: crosshair; touch-action: none; }
        
        /* Tools */
        .tools { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .tool-btn { width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .tool-btn.active { border-color: #667eea; background: #667eea; color: white; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .color-btn.active { border-color: #333; }
        
        /* Timer */
        .timer { background: #ef4444; color: white; padding: 10px 20px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .timer.warning { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Results */
        .chain-item { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .chain-drawing { max-width: 100%; border-radius: 10px; margin-top: 10px; }
        
        /* Status */
        .status { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 20px; color: white; font-weight: bold; }
        .status.online { background: #10b981; }
        .status.offline { background: #ef4444; }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- Status -->
    <div id="status" class="status offline">Offline</div>

    <!-- Setup Screen -->
    <div id="setupScreen" class="screen active">
        <h1>🎨 Gartic Phone</h1>
        <input type="text" id="playerName" placeholder="Ditt namn" maxlength="12">
        <button class="btn-primary" onclick="createRoom()">Skapa Rum</button>
        <button class="btn-secondary" onclick="showJoin()">Gå Med i Rum</button>
    </div>

    <!-- Join Screen -->
    <div id="joinScreen" class="screen">
        <h2>Gå Med i Rum</h2>
        <input type="text" id="joinCode" placeholder="Rumskod (6 bokstäver)" maxlength="6" style="text-transform: uppercase;">
        <button class="btn-primary" onclick="joinRoom()">Anslut</button>
        <button onclick="showScreen('setupScreen')">Tillbaka</button>
    </div>

    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="screen">
        <h2>Lobby</h2>
        <div class="room-code-box">
            <div>Rumskod:</div>
            <div class="room-code" id="roomCode">------</div>
            <button onclick="copyCode()" style="width: auto; padding: 10px 20px;">Kopiera</button>
        </div>
        <div class="players-grid" id="playersGrid"></div>
        <div id="hostControls">
            <input type="number" id="drawTime" value="60" min="30" max="120" style="width: 100px; display: inline;">
            <span>sekunder att rita</span>
            <button class="btn-success" onclick="startGame()" style="margin-top: 15px;">Starta Spelet!</button>
        </div>
        <button onclick="leaveRoom()">Lämna Rum</button>
    </div>

    <!-- Drawing Screen -->
    <div id="drawingScreen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="font-weight: bold; font-size: 1.2rem;" id="drawPrompt">Rita: ...</div>
            <div class="timer" id="drawTimer">60</div>
        </div>
        <div class="canvas-container">
            <canvas id="drawingCanvas" width="700" height="400"></canvas>
        </div>
        <div class="tools">
            <button class="tool-btn active" onclick="setTool('pen')">✏️</button>
            <button class="tool-btn" onclick="setTool('eraser')">🧽</button>
            <button class="tool-btn" onclick="clearCanvas()">🗑️</button>
            <div class="color-btn active" style="background: #000;" onclick="setColor('#000')"></div>
            <div class="color-btn" style="background: #ef4444;" onclick="setColor('#ef4444')"></div>
            <div class="color-btn" style="background: #3b82f6;" onclick="setColor('#3b82f6')"></div>
            <div class="color-btn" style="background: #10b981;" onclick="setColor('#10b981')"></div>
        </div>
        <button class="btn-success" onclick="submitDrawing()">Klar!</button>
    </div>

    <!-- Writing Screen -->
    <div id="writingScreen" class="screen">
        <h2>Vad ser du?</h2>
        <div class="timer" id="writeTimer">45</div>
        <img id="showDrawing" style="max-width: 100%; border-radius: 10px; margin-bottom: 15px;">
        <input type="text" id="guessInput" placeholder="Beskriv bilden..." maxlength="50">
        <button class="btn-primary" onclick="submitGuess()">Skicka</button>
    </div>

    <!-- Waiting Screen -->
    <div id="waitingScreen" class="screen">
        <h2>Väntar på andra...</h2>
        <div style="width: 100%; height: 20px; background: #eee; border-radius: 10px; margin: 20px 0;">
            <div id="waitProgress" style="width: 0%; height: 100%; background: #667eea; border-radius: 10px; transition: 0.5s;"></div>
        </div>
        <p id="waitText">0 / 4 klara</p>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen">
        <h2>Resultat!</h2>
        <div id="resultsList"></div>
        <button class="btn-primary" onclick="playAgain()">Spela Igen</button>
        <button onclick="backToLobby()">Tillbaka till Lobby</button>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        // BYT UT DENNA MOT DIN EGNA FRÅN FIREBASE:
        const firebaseConfig = {
  apiKey: "AIzaSyB0wUCaXCqWhDcgMOLPC_pIS4PRQLkpOrw",
  authDomain: "gartic-phone-game-b9a00.firebaseapp.com",
  projectId: "gartic-phone-game-b9a00",
  storageBucket: "gartic-phone-game-b9a00.firebasestorage.app",
  messagingSenderId: "18038938341",
  appId: "1:18038938341:web:858f7876b097dfdec0520c",
  measurementId: "G-F60YS5KCWS"
};

        // Initiera Firebase
        let app, database, roomRef;
        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            document.getElementById('status').className = 'status online';
            document.getElementById('status').textContent = 'Online';
        } catch (e) {
            console.log('Firebase inte konfigurerat, kör i demo-läge');
        }

        // ==================== SPEL-TILLSTÅND ====================
        const state = {
            player: { id: Math.random().toString(36).substr(2, 9), name: '', isHost: false },
            room: { code: null, players: [] },
            game: { round: 0, phase: 'lobby', chains: [], myChain: null },
            canvas: { tool: 'pen', color: '#000', isDrawing: false }
        };

        const PROMPTS = [
            "En katt som dansar", "En elefant på rymmen", "En pirat som lagar mat",
            "En robot som gråter", "En enhörning i rymden", "En dinosaurie som spelar gitarr",
            "En astronaut som fikar", "Ett spöke på semester", "En drake som yogar"
        ];

        // ==================== HJÄLPFUNKTIONER ====================
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function generateCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // ==================== RUM-HANTERING ====================
        function createRoom() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert('Ange ett namn!'); return; }
            
            state.player.name = name;
            state.player.isHost = true;
            state.room.code = generateCode();
            state.room.players = [{...state.player}];
            
            // Spara till Firebase
            if (database) {
                roomRef = database.ref('rooms/' + state.room.code);
                roomRef.set({
                    players: state.room.players,
                    phase: 'lobby',
                    settings: { drawTime: 60 },
                    created: Date.now()
                });
                
                // Lyssna på ändringar
                roomRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        state.room.players = data.players || [];
                        updateLobby();
                        if (data.phase === 'drawing' && state.game.phase === 'lobby') {
                            startDrawingPhase(data);
                        }
                    }
                });
            }
            
            document.getElementById('roomCode').textContent = state.room.code;
            document.getElementById('hostControls').style.display = 'block';
            updateLobby();
            showScreen('lobbyScreen');
        }

        function showJoin() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert('Ange ett namn först!'); return; }
            state.player.name = name;
            showScreen('joinScreen');
        }

        function joinRoom() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if (code.length !== 6) { alert('Ogiltig kod!'); return; }
            
            state.room.code = code;
            state.player.isHost = false;
            
            if (database) {
                roomRef = database.ref('rooms/' + code);
                
                roomRef.once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (!data) { alert('Rummet finns inte!'); return; }
                    
                    // Lägg till spelare
                    const players = data.players || [];
                    players.push({...state.player});
                    roomRef.update({ players: players });
                    
                    // Lyssna på ändringar
                    roomRef.on('value', (snap) => {
                        const d = snap.val();
                        if (d) {
                            state.room.players = d.players || [];
                            updateLobby();
                            if (d.phase === 'drawing' && state.game.phase === 'lobby') {
                                startDrawingPhase(d);
                            }
                        }
                    });
                });
            } else {
                // Demo-läge
                state.room.players = [
                    { id: '1', name: 'Värd', isHost: true },
                    { id: '2', name: 'Anna', isHost: false },
                    state.player
                ];
                updateLobby();
            }
            
            document.getElementById('roomCode').textContent = code;
            document.getElementById('hostControls').style.display = 'none';
            showScreen('lobbyScreen');
        }

        function updateLobby() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            state.room.players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-card';
                div.innerHTML = `<div class="player-avatar">🎨</div><div>${p.name}${p.isHost ? ' 👑' : ''}</div>`;
                grid.appendChild(div);
            });
        }

        function copyCode() {
            navigator.clipboard.writeText(state.room.code);
            alert('Kod kopierad!');
        }

        function leaveRoom() {
            if (database && roomRef) {
                roomRef.off();
                if (state.player.isHost) {
                    roomRef.remove();
                } else {
                    const players = state.room.players.filter(p => p.id !== state.player.id);
                    roomRef.update({ players: players });
                }
            }
            location.reload();
        }

        // ==================== SPEL-LOGIK ====================
        function startGame() {
            const drawTime = parseInt(document.getElementById('drawTime').value) || 60;
            
            // Skapa kedjor
            state.game.chains = state.room.players.map((p, i) => ({
                owner: p,
                items: [{ type: 'text', content: PROMPTS[i % PROMPTS.length], author: p }],
                nextPlayer: 0
            }));
            
            state.game.phase = 'drawing';
            state.game.round = 1;
            
            if (database && roomRef) {
                roomRef.update({
                    phase: 'drawing',
                    chains: state.game.chains,
                    settings: { drawTime: drawTime, round: 1 }
                });
            }
            
            startDrawingPhase({ settings: { drawTime: drawTime }, chains: state.game.chains });
        }

        function startDrawingPhase(data) {
            state.game.phase = 'drawing';
            const drawTime = data.settings?.drawTime || 60;
            
            // Hitta rätt kedja för denna spelare
            const myIndex = state.room.players.findIndex(p => p.id === state.player.id);
            state.game.myChain = state.game.chains[myIndex];
            
            const prompt = state.game.myChain.items[0].content;
            document.getElementById('drawPrompt').textContent = `Rita: "${prompt}"`;
            
            showScreen('drawingScreen');
            initCanvas();
            startTimer(drawTime, 'drawTimer', submitDrawing);
        }

        // ==================== CANVAS ====================
        function initCanvas() {
            const canvas = document.getElementById('drawingCanvas');
            const ctx = canvas.getContext('2d');
            
            // Rita vit bakgrund
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let drawing = false;
            
            const start = (e) => {
                drawing = true;
                const pos = getPos(e, canvas);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };
            
            const move = (e) => {
                if (!drawing) return;
                const pos = getPos(e, canvas);
                ctx.lineWidth = state.canvas.tool === 'eraser' ? 20 : 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = state.canvas.tool === 'eraser' ? 'white' : state.canvas.color;
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };
            
            const end = () => { drawing = false; ctx.beginPath(); };
            
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0]); });
            canvas.addEventListener('touchend', end);
        }

        function getPos(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function setTool(tool) {
            state.canvas.tool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setColor(color) {
            state.canvas.color = color;
            state.canvas.tool = 'pen';
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelector('.tool-btn').classList.add('active');
        }

        function clearCanvas() {
            const canvas = document.getElementById('drawingCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function submitDrawing() {
            const canvas = document.getElementById('drawingCanvas');
            const image = canvas.toDataURL('image/png');
            
            // Spara i kedjan
            state.game.myChain.items.push({ type: 'image', content: image, author: state.player });
            
            if (database && roomRef) {
                roomRef.child('chains').child(state.room.players.findIndex(p => p.id === state.player.id))
                    .update({ items: state.game.myChain.items });
            }
            
            showWaiting();
        }

        // ==================== SKRIV-FAS ====================
        function showWriting() {
            showScreen('writingScreen');
            document.getElementById('showDrawing').src = state.game.currentImage;
            document.getElementById('guessInput').value = '';
            startTimer(45, 'writeTimer', submitGuess);
        }

        function submitGuess() {
            const guess = document.getElementById('guessInput').value.trim();
            if (!guess) return;
            
            state.game.myChain.items.push({ type: 'text', content: guess, author: state.player });
            showWaiting();
        }

        // ==================== VÄNTNING & RESULTAT ====================
        function showWaiting() {
            showScreen('waitingScreen');
            let progress = 0;
            const interval = setInterval(() => {
                progress += 25;
                document.getElementById('waitProgress').style.width = progress + '%';
                document.getElementById('waitText').textContent = `${Math.min(progress/25, 4)} / 4 klara`;
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(showResults, 500);
                }
            }, 1000);
        }

        function showResults() {
            showScreen('resultsScreen');
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            
            state.game.chains.forEach(chain => {
                const div = document.createElement('div');
                div.style.cssText = 'background: #f5f5f5; padding: 20px; margin: 15px 0; border-radius: 10px;';
                
                let html = `<h3>${chain.owner.name}s kedja:</h3>`;
                chain.items.forEach((item, i) => {
                    if (item.type === 'text') {
                        html += `<div class="chain-item">✏️ "${item.content}" - ${item.author.name}</div>`;
                    } else {
                        html += `<div class="chain-item">🎨 <img src="${item.content}" class="chain-drawing"> - ${item.author.name}</div>`;
                    }
                });
                
                div.innerHTML = html;
                list.appendChild(div);
            });
        }

        function playAgain() {
            state.game.round = 0;
            state.game.phase = 'lobby';
            if (state.player.isHost) {
                startGame();
            } else {
                showScreen('waitingScreen');
            }
        }

        function backToLobby() {
            showScreen('lobbyScreen');
        }

        // ==================== TIMER ====================
        let timerInterval;
        function startTimer(seconds, elementId, callback) {
            clearInterval(timerInterval);
            let time = seconds;
            const el = document.getElementById(elementId);
            
            timerInterval = setInterval(() => {
                time--;
                el.textContent = time;
                if (time <= 10) el.classList.add('warning');
                if (time <= 0) {
                    clearInterval(timerInterval);
                    callback();
                }
            }, 1000);
        }

        // ==================== INIT ====================
        // Ladda sparat namn
        const saved = localStorage.getItem('garticName');
        if (saved) document.getElementById('playerName').value = saved;
        document.getElementById('playerName').addEventListener('change', (e) => {
            localStorage.setItem('garticName', e.target.value);
        });
    </script>
</body>
</html>
