<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gartic Phone P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        #room-code-input {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 24px;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #ff6b6b;
            color: white;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        .room-code {
            font-size: 3em;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 20px 0;
            color: #ffd93d;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            user-select: all;
            cursor: pointer;
        }

        .players-list {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .player {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        .player.host {
            background: rgba(255, 215, 0, 0.3);
        }

        .status {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            background: rgba(0,0,0,0.2);
        }

        canvas {
            background: white;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .tools {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .color-btn.active {
            border-color: #ffd93d;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 217, 61, 0.5);
        }

        .word-display {
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 10px;
            color: #ffd93d;
            font-weight: bold;
        }

        .timer {
            font-size: 2em;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .connection-info {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9em;
        }

        #error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            padding: 10px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 5px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Gartic Phone P2P</h1>
        
        <!-- Main Menu -->
        <div id="main-menu" class="menu">
            <input type="text" id="player-name" placeholder="Ditt namn" maxlength="20">
            <button onclick="createRoom()" id="create-btn">Skapa Rum</button>
            <button onclick="showJoin()">Gå med i Rum</button>
            
            <div class="connection-info">
                <p><strong>🎮 Så funkar det:</strong></p>
                <p>1. Skapa ett rum eller gå med med en kod</p>
                <p>2. Dela koden med dina vänner</p>
                <p>3. Allt sker direkt mellan era datorer!</p>
                <p style="margin-top: 10px; font-size: 0.8em; opacity: 0.8;">
                    ⚠️ Host måste vara ansluten för att spelet ska fungera
                </p>
            </div>
        </div>

        <!-- Join Room -->
        <div id="join-menu" class="menu hidden">
            <input type="text" id="room-code-input" placeholder="ABCD" maxlength="4">
            <button onclick="joinRoom()" id="join-btn">Gå med</button>
            <button onclick="showMain()">Tillbaka</button>
        </div>

        <!-- Lobby -->
        <div id="lobby" class="hidden">
            <p style="text-align: center;">Din rumskod (klicka för att kopiera):</p>
            <div class="room-code" id="room-code-display" onclick="copyCode()">----</div>
            <div class="status" id="connection-status">Startar...</div>
            
            <div class="players-list" id="players-list">
                <h3>Spelare:</h3>
            </div>
            
            <button id="start-btn" class="hidden" onclick="startGame()">Starta Spelet!</button>
            <p id="waiting-text" style="text-align: center; margin-top: 20px;">Väntar på host...</p>
        </div>

        <!-- Game -->
        <div id="game" class="hidden">
            <div class="word-display" id="current-word"></div>
            <div class="timer" id="timer">60</div
